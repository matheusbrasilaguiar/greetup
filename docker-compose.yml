version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: greetup-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greetup
    ports:
      - "5432:5432"
    volumes:
      - greetup_postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: greetup-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - greetup_rabbitmq_data:/var/lib/rabbitmq

  gateway:
    build: ./gateway
    container_name: greetup-gateway
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-change-me}
    depends_on:
      - rabbitmq

volumes:
  greetup_postgres_data:
  greetup_rabbitmq_data:
